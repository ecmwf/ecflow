builds:
  - name: "hpc-build"
    type: "hpc-module"
    enabled: false
    config:
      config_path: .github/cd-hpc-config.yml
      platforms:
        - gnu-12.2.0
        - gnu-8.5.0
        - nvidia-22.11
        - intel-2021.4.0

  - name: "tarball"
    type: "tarball"
    enabled: true
    config:
      cmake_options: -DCMAKE_VERBOSE_MAKEFILE=ON -DENABLE_ALL_TESTS=ON -DBOOST_ROOT=${BOOST_ROOT_DIR} -DBOOST_INCLUDEDIR=${BOOST_INCLUDE_DIR} -DBOOST_LIBRARYDIR=${BOOST_LIB_DIR} -DOPENSSL_ROOT_DIR=${OPENSSL_ROOT_DIR} -DENABLE_STATIC_BOOST_LIBS=OFF
      confluence_space: "ECFLOW"
      confluence_page_title: "For testing tarball uploads"
