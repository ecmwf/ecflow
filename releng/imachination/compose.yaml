services:

  revproxy:
    hostname: revproxy
    build: ./revproxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./revproxy/server:/usr/share/nginx/html/server
      - ./revproxy/cfgs/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      inner:
        ipv4_address: 172.42.0.2

  authotron:
    hostname: authotron
    image: eccr.ecmwf.int/auth-o-tron/auth-o-tron:0.2.5
    ports:
      - "8080:8080"
    volumes:
      - ./authotron/config.yaml:/app/config.yaml
    networks:
      inner:
        ipv4_address: 172.42.0.3

  ecflow-server:
    platform: linux/amd64
    hostname: ecflow-server
    image: eccr.ecmwf.int/ecflow-dev-environments/ecflow-serveronly-dev:latest
    ports:
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./ecflow/deploy/workspace:/workspace
    networks:
      inner:
        ipv4_address: 172.42.0.4

networks:
  inner:
    name: inner
    ipam:
      config:
        - subnet: 172.42.0.0/16
